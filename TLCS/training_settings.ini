[simulation]
gui = False
total_episodes = 60
max_steps = 1500
n_cars_generated = 2000
green_duration = 10
yellow_duration = 4

[model]
num_layers = 4
width_layers = 400
;the number of neurons per layer in the neural network.
batch_size = 100
learning_rate = 0.001
training_epochs = 800

[memory]
memory_size_min = 600
;the min number of samples needed into the memory to enable the neural network training
memory_size_max = 50000
;the max number of samples that the memory can contain

[agent]
num_states = 24
num_actions = 4
gamma = 0.75
;discount factor: 0.75 focuses the agent on near-term queue reduction

[dir]
models_path_name = models
experiment_name = dqn_24state_linearg_moredecision
sumocfg_file_name = sumo_config.sumocfg
